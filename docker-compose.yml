services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: em_backend
    restart: unless-stopped
    networks:
      - app-net
    environment:
      APP_PORT: ${APP_PORT:-8080}
      APP_HOST: "0.0.0.0"
    # Port 8080 is NOT published to the host — internal only
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: em_nginx
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro  # Монтируем frontend как volume
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge
    name: effective_mobile_net